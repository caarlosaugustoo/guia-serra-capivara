<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <h1>Guia Serra da Capivara</h1>

    <nav>
      <a href="index.html">Início</a>
      <a href="pontos-turisticos.html">Pontos Turísticos</a>
      <a href="contato.html">Contato</a>
    </nav>
  </header>

 <main>
  <section class="contato">
    <h2>Contato</h2>
    <p>
      Preencha o formulário abaixo para enviar uma mensagem ou saber mais sobre a Serra da Capivara.
    </p>

    <form>
      <label for="nome">Nome:</label>
      <input type="text" id="nome" name="nome" placeholder="Digite seu nome">

      <label for="email">E-mail:</label>
      <input type="email" id="email" name="email" placeholder="Digite seu e-mail">

      <label for="cidade">Cidade:</label>
      <input type="text" id="cidade" name="cidade" placeholder="Digite sua cidade">

      <label for="interesse">Interesse:</label>
      <select id="interesse" name="interesse">
        <option value="">Selecione uma opção</option>
        <option value="turismo">Turismo</option>
        <option value="historia">História</option>
        <option value="natureza">Natureza</option>
        <option value="outro">Outro</option>
      </select>

      <label for="mensagem">Mensagem:</label>
      <textarea id="mensagem" name="mensagem" placeholder="Digite sua mensagem"></textarea>

      <button type="submit">Enviar mensagem</button>
    </form>
  </section>
</main>

  <footer>
    <p>Projeto acadêmico - Front-End 1</p>
  </footer>

</body>
</html>
